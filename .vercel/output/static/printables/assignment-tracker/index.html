                        btn.disabled = true;

                        const opt = {
                            margin:       0,
                            filename:     filename,
                            image:        { type: 'jpeg', quality: 1 },
                            html2canvas:  { scale: 2, useCORS: true },
                            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                        };

                        // Generate PDF
                        html2pdf().set(opt).from(element).save().then(() => {
                            // Restore button
                            btn.innerHTML = originalText;
                            btn.disabled = false;
                        });
                    });
                }
            });
        })();</script> </body> </html>
